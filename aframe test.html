<!-- index.html -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

AFRAME.registerComponent('carro', {
    init: function(keys){}
    tick: function(position; rotation.y){}
})
<a-scene>
  <!-- O carro -->
  <a-entity
    id="carro"
    car-controller
    position="0 0.5 0">

    <!-- Câmera segue o carro -->

  <a-plane rotation="-90 0 0" width="50" height="50" color="#888"></a-plane>
</a-scene>
