<div style="width:100%;height:520px;border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary);position:relative;">
  <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(0,0,0,0.55);color:#fff;font-size:13px;padding:6px 16px;border-radius:20px;pointer-events:none;white-space:nowrap;">
    ↑ ↓ ← → para mover &nbsp;|&nbsp; Arrast7e para girar a câmera
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script>

  AFRAME.registerComponent('car-controller', {
    init: function () {
      this.keys = {};
      this.speed = 0;
      this.maxSpeed = 0.12;
      this.accel = 0.006;
      this.friction = 0.92;
      this.turnSpeed = 0.04;
      this.angle = 0;
      this.wheelAngle = 0;

      this._onKeyDown = (e) => { this.keys[e.key] = true; };
      this._onKeyUp   = (e) => { this.keys[e.key] = false; };
      window.addEventListener('keydown', this._onKeyDown);
      window.addEventListener('keyup',   this._onKeyUp);

      this.fl = document.getElementById('wheel-fl');
      this.fr = document.getElementById('wheel-fr');
      this.rl = document.getElementById('wheel-rl');
      this.rr = document.getElementById('wheel-rr');
    },
    tick: function (t, dt) {
      const k = this.keys;
      const fwd = k['ArrowUp'];
      const bwd = k['ArrowDown'];
      const lft = k['ArrowLeft'];
      const rgt = k['ArrowRight'];

      if (fwd) this.speed = Math.min(this.speed + this.accel, this.maxSpeed);
      else if (bwd) this.speed = Math.max(this.speed - this.accel, -this.maxSpeed * 0.6);
      else this.speed *= this.friction;

      if (Math.abs(this.speed) > 0.001) {
        const dir = this.speed > 0 ? 1 : -1;
        if (lft) this.angle += this.turnSpeed * dir;
        if (rgt) this.angle -= this.turnSpeed * dir;
      }

      const pos = this.el.getAttribute('position');
      pos.x -= Math.sin(this.angle) * this.speed;
      pos.z -= Math.cos(this.angle) * this.speed;
      this.el.setAttribute('position', pos);
      this.el.setAttribute('rotation', {x:0, y: THREE.MathUtils.radToDeg(this.angle), z:0});

      const roll = THREE.MathUtils.radToDeg(this.speed * 18);
      const steer = lft ? 28 : rgt ? -28 : 0;
      if (this.fl) this.fl.setAttribute('rotation', `${roll} ${steer} 90`);
      if (this.fr) this.fr.setAttribute('rotation', `${roll} ${steer} 90`);
      if (this.rl) this.rl.setAttribute('rotation', `${roll} 0 90`);
      if (this.rr) this.rr.setAttribute('rotation', `${roll} 0 90`);
    },
    remove: function () {
      window.removeEventListener('keydown', this._onKeyDown);
      window.removeEventListener('keyup',   this._onKeyUp);
    }
  });
  </script>
